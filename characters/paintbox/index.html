        <h2 id="Paintbox"><a href="#Paintbox" class="headerlink" title="Paintbox"></a>Paintbox</h2><ul>
<li>平克弗洛伊德系角色喜提新人。迷幻，漂游在幻觉里吧！虽然她长得像日光。</li>
<li>本体是安乐椅侦探一般的存在，经常突发性陷入无法抑制的长期睡眠，醒来后会失去一部分清醒时的记忆。日常行动靠别人给她推轮椅，受害者：曾经还不是药剂师的Comfortably Numb（虽然现在也不是）。</li>
<li>经常做梦，梦到无限的空间里有无限扇门。她打开门走进去，却只有空房间。每一扇门都是如此，然后仅有沉默。这里似曾相识，而她认不出这是何地。</li>
</ul>
